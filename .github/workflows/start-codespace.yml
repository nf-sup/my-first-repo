name: Start My Codespace
on:
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Codespace
        run: |
          # 1. מעירים את המכונה
          curl -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/user/codespaces/automatic-winner-r4wg4r4vx55q2w7vp/start
          
          # המתנה קלה שהמכונה תתעורר
          sleep 5
          
          # 2. שליפת פרטי החיבור האמיתיים והדפסתם בצורה ברורה
          curl -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" https://api.github.com/user/codespaces/automatic-winner-r4wg4r4vx55q2w7vp | grep -E "id|name|state|connection" -A 10
